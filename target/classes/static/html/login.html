<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institución Educativa "Mi Perú" - Acceso</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <main class="login-page">
        <section class="login-hero">
            <div class="hero-content">
                <img src="../img/logo.png" alt="Logo I.E. Mi Perú" class="hero-logo">

                <h1>I.E. "Mi Perú"</h1>
                <p class="hero-subtitle">Portal Escolar Inteligente</p>

                <div class="hero-divider">
                    <span></span>
                </div>

                <p class="hero-text">
                    Comprometidos con la educación, formando líderes con valores para un mejor futuro.
                </p>

                <div class="hero-features">
                    <div class="feature">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3l7 3v5c0 4.5-2.9 8.6-7 10-4.1-1.4-7-5.5-7-10V6l7-3z"></path>
                            <path d="M9.5 12l1.7 1.7L15 9.8"></path>
                        </svg>
                        <span>Seguro</span>
                    </div>

                    <div class="feature">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M16 11a4 4 0 1 0-8 0"></path>
                            <path d="M4 20a8 8 0 0 1 16 0"></path>
                            <path d="M18 8.5a3 3 0 0 1 2.2 4.9"></path>
                            <path d="M20.5 20a6 6 0 0 0-3.2-4.8"></path>
                        </svg>
                        <span>Confiable</span>
                    </div>

                    <div class="feature">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 19V5"></path>
                            <path d="M4 19h16"></path>
                            <path d="M8 16v-5"></path>
                            <path d="M12 16V8"></path>
                            <path d="M16 16v-7"></path>
                        </svg>
                        <span>Eficiente</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="login-panel">
            <div class="login-card fade-in">
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path>
                        <path d="M4 21a8 8 0 0 1 16 0"></path>
                    </svg>
                </div>

                <h2>Iniciar Sesión</h2>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

                <form id="login-form" autocomplete="on">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <div class="input-box">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path>
                                <path d="M4 21a8 8 0 0 1 16 0"></path>
                            </svg>
                            <input type="text" id="username" placeholder="Ingrese su usuario" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-box">

                            <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                                <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                            </svg>

                            <input type="password" id="password" placeholder="••••••••" required>

                            <button type="button" id="toggle-password" class="toggle-password"
                                aria-label="Mostrar contraseña">

                                <!-- Ojo cerrado -->
                                <svg id="eye-icon" viewBox="0 0 24 24">
                                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>

                            </button>

                        </div>
                    </div>

                    <button type="submit" id="btn-login" class="btn-login">
                        Iniciar Sesión
                    </button>
                </form>

                <div id="login-error" class="alert alert-danger hidden"></div>

                <div class="secure-note">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                        <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                    </svg>
                    <span>Acceso seguro para <strong>Directores, Docentes y Alumnos</strong></span>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/login.js"></script>
</body>

</html>
